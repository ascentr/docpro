{% extends "base.html" %}{% load static %}{% load bootstrap5 %}
{% block head %}
  <title> Completed Projects </title>

    <style>
      .links1{ background-color: #2c3e50;}
    </style>

  {% endblock %}

{% block  content %}
  <div class="container">
    <div class="row">
      <div class="col-2"></div>
      <div class="col-8 d-flex flex-direction-row justify-content-center mt-3">
        <h1>Completed Projects</h1> 
      </div>
      <div class="col-2"></div>
    </div>
    <div class="row">
      <div class="col-2"></div>
      <div class="col-8 d-flex flex-direction-row justify-content-center mt-3">
        <span class="mx-3 p-1"><a href="{% url 'projects' %}">All Projects </a> </span>
        <span class="mx-3 p-1"><a href="{% url 'ongoing' %}"> Ongoing Projects </a> </span>
      </div>
      <div class="col-2"></div>
    </div>
    <div class="row">
      <div class="col-2"></div>
      <div class="col-8 d-flex flex-column justify-content-center mt-3 text-info">
        {% for p in projects %}
          <div class="d-flex flex-direction-row justify-content-start mt-2 links1">
            <div class="p-2">{{p.id}}</div> 
            <a href="{% url 'projectdetail' p.id %}" class="text-info text-decoration-none">
              <div class="p-2">{{p.name}}</div> 
            </a>
            <div class="p-2">{{p.postcode}}</div>
          </div>
        {% endfor %}
      </div>
      <div class="col-2"></div>
    </div>


  </div>
{% endblock  %}
