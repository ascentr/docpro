<!DOCTYPE html>
<html lang="en">
{% load static %} {% load bootstrap5 %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css"
        integrity="sha384-UHRtZLI+pbxtHCWp1t77Bi1L4ZtiqrqD80Kn4Z8NTSRyMA2Fd33n5dQ8lWUE00s/" crossorigin="anonymous">

  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

  <style>
    .topbar{ 
      background-color: #2c3e50; 
      height: 100px; 
      justify-content: center; 
      align-items: center;
    }

    .home-icon { font-size: 2rem; }
    @media (min-width: 768px) {
      .home-icon { font-size: 3rem; }
    }

  </style>


  {% block head %}


  {% endblock %}
</head>
<body>
<nav class="navbar border-bottom border-body topbar row text-center">

  <!-- Left bar -->
  <div class="col-3 d-none d-md-block bg-info"
       style="height: 2px;"></div>

  <!-- Center -->
  <div class="col-12 col-md-6 d-flex flex-column flex-md-row
              justify-content-center align-items-center" id="div1">

    <div class="col-auto border border-info border-3 rounded p-1 ">
      <a href="{% url 'home' %}">
        <i class="fas fa-home fa-3x text-info home-icon"></i>
      </a>
    </div>

    <div class="d-flex align-items-center text-info justify-content-center m-1 mt-md-3 mx-md-3">
      <h1>Work Track - demo</h1>
    </div>

  </div>

  <!-- Right bar -->
  <div class="col-3 d-none d-md-block bg-info"
       style="height: 2px;"></div>

</nav>
    
   {% block content  %}


    {% endblock  %}


    {% block js  %}

    {% endblock  %}



</body>
</html>
